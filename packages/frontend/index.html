<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="My Dash — Modern VPS Management Dashboard. Monitor servers, analytics, automation, backups, Docker, security, and more from a single unified interface." />
    <meta name="keywords" content="VPS dashboard, server monitoring, analytics, automation, DevOps, infrastructure management" />
    <meta name="author" content="Aka" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="application-name" content="My Dash" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="My Dash" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" sizes="192x192" />
    <link rel="apple-touch-icon" href="/icon-512.svg" sizes="512x512" />
    <link rel="manifest" href="/manifest.json" />
    <title>My Dash — VPS Management Dashboard</title>
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html{color-scheme:dark;background:#0a0a0a}
      body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif;background:#0a0a0a;color:#e2e8f0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      #root{width:100%;min-height:100vh}
      #loading-splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0a;z-index:9999;transition:opacity .3s ease}
      #loading-splash.hidden{opacity:0;pointer-events:none}
      .splash-logo{width:64px;height:64px;display:flex;align-items:center;justify-content:center;background:#3b82f6;border-radius:18px;margin-bottom:24px;box-shadow:0 8px 32px rgba(59,130,246,.3)}
      .splash-logo span{font-size:28px;font-weight:700;color:#fff}
      .splash-title{font-size:20px;font-weight:600;color:#f1f5f9;margin-bottom:8px}
      .splash-subtitle{font-size:13px;color:#64748b;margin-bottom:32px}
      .splash-spinner{width:36px;height:36px;border:3px solid rgba(59,130,246,.15);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-splash">
        <div class="splash-logo"><span>M</span></div>
        <div class="splash-title">My Dash</div>
        <div class="splash-subtitle">Loading dashboard...</div>
        <div class="splash-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
